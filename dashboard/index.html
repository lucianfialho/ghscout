<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ghscout — Product Opportunity Radar</title>
  <meta name="description" content="Open-source product opportunity radar powered by GitHub issue analysis. Updated weekly.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>ghscout</h1>
      <p class="subtitle">Product Opportunity Radar — from GitHub Issues</p>
      <p class="meta" id="meta">Loading...</p>
    </div>
  </header>

  <div class="container">
    <nav id="breadcrumb" class="breadcrumb"></nav>

    <div id="filters" class="filters" style="display:none">
      <select id="sort-by">
        <option value="score">Sort by score</option>
        <option value="reactions">Sort by reactions</option>
        <option value="issues">Sort by issue count</option>
        <option value="frustration">Sort by frustration</option>
      </select>
      <input type="range" id="min-score" min="0" max="100" value="0">
      <span id="min-score-label">Min score: 0</span>
    </div>

    <div id="content"></div>
  </div>

  <footer>
    <div class="container">
      <a href="https://github.com/lucianfialho/ghscout">GitHub</a> ·
      Install: <code>npx ghscout scan vercel/next.js</code> ·
      Built by <a href="https://github.com/lucianfialho">Lucian Fialho</a>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
